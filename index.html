<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Alexander / Seriously</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0c0b0d;
                --surface: #131116;
                --border: #221e27;
                --text: #ece8f0;
                --muted: #5a5462;
                --accent: #e93e61;
                --accent2: #a51765;
                --accent3: #a75089;
                --accent-dim: rgba(233, 62, 97, 0.07);
            }

            html,
            body {
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: "DM Mono", monospace;
                -webkit-font-smoothing: antialiased;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
                opacity: 0.04;
                pointer-events: none;
                z-index: 100;
            }

            .page {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 3rem 1.5rem;
            }

            .container {
                width: 100%;
                max-width: 420px;
                animation: fadeUp 0.7s ease both;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(18px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* Avatar */
            .avatar-wrap {
                margin-bottom: 1.4rem;
                position: relative;
                width: 80px;
                height: 80px;
            }

            .avatar-wrap::before {
                content: "";
                position: absolute;
                inset: -2px;
                border-radius: 50%;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent2),
                    var(--accent3)
                );
                z-index: 0;
            }

            .avatar {
                position: relative;
                z-index: 1;
                width: 80px;
                height: 80px;
                border-radius: 50%;
                object-fit: cover;
                object-position: center top;
                display: block;
                border: 2px solid var(--bg);
            }

            /* Header */
            .header {
                margin-bottom: 2.4rem;
                display: flex;
                flex-direction: column;
                gap: 0.3rem;
            }

            .header-name {
                font-family: "Syne", sans-serif;
                font-weight: 800;
                font-size: 2rem;
                letter-spacing: -0.02em;
                color: var(--text);
                line-height: 1;
            }

            .header-sub {
                font-size: 0.7rem;
                color: var(--muted);
                letter-spacing: 0.18em;
                text-transform: uppercase;
            }

            .divider {
                width: 32px;
                height: 1px;
                background: linear-gradient(
                    90deg,
                    var(--accent),
                    var(--accent3)
                );
                margin: 0.8rem 0;
                opacity: 0.7;
            }

            /* Links */
            .links {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }

            .link-item {
                display: flex;
                align-items: center;
                gap: 1rem;
                padding: 0.9rem 1.1rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 4px;
                text-decoration: none;
                color: var(--text);
                cursor: pointer;
                position: relative;
                overflow: hidden;
                transition:
                    border-color 0.2s,
                    background 0.2s;
                animation: fadeUp 0.7s ease both;
            }

            .link-item:nth-child(1) {
                animation-delay: 0.05s;
            }
            .link-item:nth-child(2) {
                animation-delay: 0.1s;
            }
            .link-item:nth-child(3) {
                animation-delay: 0.15s;
            }
            .link-item:nth-child(4) {
                animation-delay: 0.2s;
            }
            .link-item:nth-child(5) {
                animation-delay: 0.25s;
            }
            .link-item:nth-child(6) {
                animation-delay: 0.3s;
            }
            .link-item:nth-child(7) {
                animation-delay: 0.35s;
            }

            .link-item:hover {
                border-color: rgba(233, 62, 97, 0.28);
                background: var(--accent-dim);
            }

            .link-item::after {
                content: "";
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 2px;
                background: linear-gradient(
                    180deg,
                    var(--accent),
                    var(--accent3)
                );
                transform: scaleY(0);
                transform-origin: bottom;
                transition: transform 0.2s ease;
            }

            .link-item:hover::after {
                transform: scaleY(1);
            }

            .icon-wrap {
                width: 32px;
                height: 32px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--accent);
            }

            .icon-wrap svg {
                width: 20px;
                height: 20px;
                fill: currentColor;
            }

            .link-info {
                flex: 1;
                min-width: 0;
            }

            .link-label {
                font-size: 0.62rem;
                color: var(--muted);
                letter-spacing: 0.15em;
                text-transform: uppercase;
                line-height: 1;
                margin-bottom: 0.25rem;
            }

            .link-value {
                font-size: 0.85rem;
                font-weight: 500;
                color: var(--text);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .action-badge {
                font-size: 0.55rem;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--muted);
                border: 1px solid var(--border);
                padding: 0.2rem 0.45rem;
                border-radius: 2px;
                flex-shrink: 0;
                transition:
                    color 0.2s,
                    border-color 0.2s;
            }

            .link-item:hover .action-badge {
                color: var(--accent);
                border-color: rgba(233, 62, 97, 0.3);
            }

            .link-item.copied .action-badge {
                color: #a75089;
                border-color: rgba(167, 80, 137, 0.35);
            }

            .footer {
                margin-top: 2.5rem;
                font-size: 0.62rem;
                color: var(--muted);
                letter-spacing: 0.1em;
                text-transform: uppercase;
            }

            @media (max-width: 480px) {
                .header-name {
                    font-size: 1.6rem;
                }
            }
        </style>
    </head>

        <script>
            document.querySelectorAll("[data-copy]").forEach((el) => {
                el.addEventListener("click", () => {
                    const value = el.dataset.copy;
                    navigator.clipboard.writeText(value).then(() => {
                        const badge = el.querySelector(".action-badge");
                        const orig = badge.textContent;
                        badge.textContent = "скопировано";
                        el.classList.add("copied");
                        setTimeout(() => {
                            badge.textContent = orig;
                            el.classList.remove("copied");
                        }, 1800);
                    });
                });
            });
